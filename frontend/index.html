<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>datavis.au</title>
  <link rel="icon" type="image/svg+xml" href="/assets/datavis_favicon.svg">
  <style>
    :root {
      color-scheme: dark;
      --bg: #071019;
      --panel: #0d1823;
      --panel-hover: #122131;
      --border: rgba(132, 166, 196, 0.18);
      --text: #e9f1f7;
      --muted: #96a7b7;
      --accent: #79c6ff;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
      background:
        radial-gradient(circle at top, rgba(51, 102, 153, 0.2), transparent 42%),
        linear-gradient(180deg, #09121b 0%, var(--bg) 55%, #050a10 100%);
      color: var(--text);
    }

    main {
      width: min(960px, 100%);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .grid {
      margin-top: 28px;
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .card {
      display: block;
      padding: 18px 18px 20px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(19, 33, 47, 0.96), rgba(11, 21, 31, 0.98));
      box-shadow: var(--shadow);
      color: inherit;
      text-decoration: none;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(121, 198, 255, 0.4);
      background: linear-gradient(180deg, var(--panel-hover), var(--panel));
      outline: none;
    }

    .card strong {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 24px 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>datavis.au</h1>
    <p>Fast access to the core pages.</p>
    <div class="grid">
      <a class="card" href="/live">
        <strong>Live</strong>
        <span>Raw tick replay and live execution view.</span>
      </a>
      <a class="card" href="/separation">
        <strong>Separation</strong>
        <span>Layered movement packets across micro, median, and macro flow.</span>
      </a>
      <a class="card" href="/bigPic">
        <strong>Big Pic</strong>
        <span>Wide-range history with compressed point density.</span>
      </a>
      <a class="card" href="/sql">
        <strong>SQL</strong>
        <span>Direct schema and query access for admin work.</span>
      </a>
    </div>
  </main>
</body>
</html>
