<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Segmeling – Live/Review</title>

  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --text: #e8eefc;
      --muted: #9fb0d0;
      --border: #22304a;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--text);
      user-select: none;
    }

    .top-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    select, input[type="number"] {
      background: #0c1426;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.4rem;
      outline: none;
    }

    .btn-run, .btn-stop {
      border: 1px solid var(--border);
      background: #0c1426;
      color: var(--text);
      border-radius: 8px;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-run { border-color: rgba(74,163,255,0.6); }
    .btn-stop { border-color: rgba(255,74,106,0.6); }

    .toggles {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(18,26,43,0.7);
      flex-wrap: wrap;
    }

    .toggle-item {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .layer-na {
      opacity: 0.75;
      font-size: 0.8rem;
    }

    .status {
      padding: 0;
      color: var(--muted);
      font-size: 0.9rem;
      margin-left: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 38vw;
    }

    #segmeling-chart {
      width: 100%;
      height: calc(100vh - 126px);
    }
  </style>
</head>

<body>
  <header class="top-bar">
    <div class="brand">SEGEMLING</div>

    <div class="top-group">
      <label>
        Mode
        <select id="mode-select">
          <option value="live">Live</option>
          <option value="review">Review</option>
        </select>
      </label>

      <button id="btn-run-stop" class="btn-run">
        <span class="label">Run</span>
      </button>
    </div>

    <!-- Review jump controls -->
    <div class="top-group" style="margin-left:auto; gap:0.5rem;">
      <label>
        From Id
        <input
          id="review-from-id"
          type="number"
          min="1"
          step="1"
          inputmode="numeric"
          placeholder="(optional)"
          style="width: 10rem;"
        />
      </label>

      <label>
        Window
        <input
          id="review-window"
          type="number"
          min="10"
          step="10"
          inputmode="numeric"
          value="2000"
          style="width: 6rem;"
        />
      </label>

      <button id="btn-review-jump" class="btn-run">Jump</button>
    </div>

    <div id="status-line" class="status">Loading…</div>
  </header>

  <div class="toggles">
    <span class="toggle-item">
      <input type="checkbox" data-layer-group="mid" checked />
      Mid
    </span>

    <span class="toggle-item">
      <input type="checkbox" data-layer-group="bid" />
      Bid
    </span>

    <span class="toggle-item">
      <input type="checkbox" data-layer-group="ask" />
      Ask
    </span>

    <span class="toggle-item">
      <input type="checkbox" data-layer-group="kal" checked />
      Kal
    </span>

    <span class="toggle-item">
      <input type="checkbox" data-layer-group="k2" checked />
      K2
    </span>

    <span class="toggle-item">
      <input id="piv-visible-toggle" type="checkbox" data-layer-group="piv" />
      Piv
      <select id="piv-level-select" aria-label="Pivot level">
        <option value="1" selected>1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </span>
  </div>

  <div id="segmeling-chart"></div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="chart-core.js"></script>
  <script src="index-core.js"></script>
</body>
</html>
