<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K2 Flip Candles</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #060a12;
      color: #d7e0ff;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    .TopBar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #0b1220;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .Group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .Hint {
      color: rgba(215, 224, 255, 0.75);
      font-size: 12px;
    }
    input, select {
      background: #0f1a2e;
      color: #d7e0ff;
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 6px 8px;
      border-radius: 8px;
      outline: none;
    }
    .Btn {
      background: #0f1a2e;
      color: #d7e0ff;
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 6px 10px;
      border-radius: 10px;
      cursor: pointer;
    }
    .ChartWrap { padding: 10px 12px 12px; }
    #k2-chart {
      width: 100%;
      height: calc(100vh - 74px);
      border-radius: 14px;
      overflow: hidden;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="/frontend/chart-core.js"></script>
  <script src="/frontend/k2-core.js"></script>
</head>
<body>
  <div class="TopBar">
    <div class="Group">
      <span class="Hint">Symbol</span>
      <input id="k2-symbol" value="XAUUSD" />
    </div>
    <div class="Group">
      <span class="Hint">Limit</span>
      <input id="k2-limit" type="number" min="1" max="5000" value="500" />
    </div>
    <div class="Group">
      <span class="Hint">From ID</span>
      <input id="k2-from-id" type="number" min="1" step="1" placeholder="optional" />
    </div>
    <button id="k2-refresh" class="Btn">Refresh</button>
    <label class="Group">
      <input id="k2-poll" type="checkbox" checked />
      <span class="Hint">Auto refresh</span>
    </label>
    <div style="flex:1"></div>
    <div class="Hint" id="k2-status">Idle</div>
  </div>

  <div class="ChartWrap">
    <div id="k2-chart"></div>
  </div>
</body>
</html>
