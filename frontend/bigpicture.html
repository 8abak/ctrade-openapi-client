<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>datavis.au | Big Picture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/assets/datavis_favicon.svg">
</head>
<body class="page-live page-bigpicture">
  <div class="live-workspace is-sidebar-collapsed" id="bigPictureWorkspace">
    <button
      class="ghost-button live-sidebar-toggle"
      id="sidebarToggle"
      type="button"
      aria-controls="bigPictureSidebar"
      aria-expanded="false"
      aria-label="Open big picture controls"
    >
      <span class="live-sidebar-toggle-bars" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
      <span class="sr-only">Toggle big picture controls</span>
    </button>

    <button
      class="live-sidebar-backdrop"
      id="sidebarBackdrop"
      type="button"
      aria-hidden="true"
      tabindex="-1"
    ></button>

    <aside class="panel live-sidebar" id="bigPictureSidebar">
      <div class="live-sidebar-scroll">
        <header class="live-sidebar-header">
          <nav class="app-nav" aria-label="Primary">
            <a class="app-nav-link" href="/live">Li</a>
            <a class="app-nav-link" href="/backbone">Ba</a>
            <a class="app-nav-link app-nav-link-active" href="/bigPic">Bi</a>
            <a class="app-nav-link" href="/sql">Sq</a>
          </nav>
          <h1>Big Picture</h1>
          <p class="live-sidebar-copy">Mouse-wheel through wider time ranges while the backend keeps returning only about 2000 representative ticks per view.</p>
          <div class="meta-strip" id="bigPictureMeta">Waiting for range...</div>
          <div class="meta-strip" id="bigPicturePerf">Idle.</div>
          <div class="status-line live-status" id="statusLine">Ready.</div>
        </header>

        <section class="live-sidebar-section">
          <div class="live-form-grid">
            <label class="live-control-field-wide">
              <span>target visible points</span>
              <input id="pointTarget" type="number" min="200" max="2400" inputmode="numeric" value="2000">
            </label>
          </div>

          <div class="live-inline-actions">
            <button class="primary-button compact-button" id="latestButton" type="button">Load Latest</button>
            <button class="ghost-button compact-button" id="zoomInButton" type="button">Zoom In</button>
            <button class="ghost-button compact-button" id="zoomOutButton" type="button">Zoom Out</button>
          </div>

          <div class="meta-strip">Wheel down: wider history. Wheel up: tighter range. Each redraw stays close to the target point count.</div>
        </section>
      </div>
    </aside>

    <section class="live-chart-stage">
      <div class="panel chart-panel live-chart-panel" id="chartPanel">
        <div id="bigPictureChart" class="chart-host"></div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="/assets/bigpicture.js"></script>
</body>
</html>
