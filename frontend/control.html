<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>datavis.au | Control</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/assets/datavis_favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body class="page-control">
  <main class="control-shell">
    <aside class="panel control-sidebar">
      <div class="control-sidebar-head">
        <a class="back-link" href="/">datavis.au</a>
        <h1>Control</h1>
        <div class="sql-muted" id="controlSidebarMeta">Loading private control plane...</div>
      </div>
      <nav class="control-nav" id="controlNav"></nav>
      <div class="control-sidebar-foot">
        <div class="status-line" id="controlStatusLine">Connecting to control API...</div>
      </div>
    </aside>

    <section class="control-main">
      <header class="panel control-topbar">
        <div>
          <div class="sql-label" id="pageEyebrow">Overview</div>
          <h2 id="pageTitle">Control Panel</h2>
        </div>
        <div class="control-topbar-actions">
          <button class="ghost-button compact-button" id="refreshButton" type="button">Refresh</button>
        </div>
      </header>

      <section class="control-content" id="controlContent">
        <div class="panel control-loading">
          <div class="sql-label">Loading</div>
          <p class="sql-muted">Fetching current loop state, incidents, mission policy, and candidate summaries.</p>
        </div>
      </section>
    </section>
  </main>

  <script src="/assets/control.js"></script>
</body>
</html>
