<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Regime Explorer</title>
  <style>
    :root {
      --bg: #07111d;
      --panel: rgba(11, 22, 38, 0.9);
      --line: rgba(167, 190, 225, 0.18);
      --text: #edf4ff;
      --muted: #a7b6cd;
      --accent: #4fd1a1;
      --warn: #f2b84b;
      --danger: #ff7c6b;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(79, 209, 161, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(122, 227, 255, 0.12), transparent 24%),
        linear-gradient(180deg, #06101a 0%, #07111d 48%, #040911 100%);
      color: var(--text);
      font-family: "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif;
    }

    .TopBar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(7, 17, 29, 0.88);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .Badge {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(79, 209, 161, 0.24);
      background: rgba(79, 209, 161, 0.08);
      color: #cbf6e8;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .Group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .Hint {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    select, input, button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0d1a2d;
      color: var(--text);
      padding: 7px 10px;
    }

    input[type="number"] { width: 90px; }
    button { cursor: pointer; }
    .Btn.on { background: #1d355b; }
    .PrimaryBtn {
      background: linear-gradient(135deg, rgba(79, 209, 161, 0.28), rgba(122, 227, 255, 0.22));
      border-color: rgba(79, 209, 161, 0.32);
      color: white;
    }

    .Shell {
      max-width: 1500px;
      margin: 0 auto;
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .Panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      padding: 16px;
      box-shadow: 0 18px 52px rgba(0, 0, 0, 0.22);
    }

    .Panel h2, .Panel h3 {
      margin: 0 0 10px;
      letter-spacing: 0.03em;
    }

    .Panel p {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.45;
    }

    .InfoGrid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 14px;
    }

    .ErrorPanel {
      border-color: rgba(255, 124, 107, 0.28);
      background: rgba(62, 17, 15, 0.72);
    }

    .ErrorList {
      margin: 0;
      padding-left: 18px;
      color: #ffd2cb;
    }

    .ErrorList li {
      margin-bottom: 8px;
    }

    .Endpoint {
      display: inline-block;
      min-width: 220px;
      color: #ffb4a8;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      margin-right: 10px;
    }

    .ChartWrap {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(7, 14, 25, 0.92);
      padding: 10px;
    }

    #chart {
      width: 100%;
      min-height: 520px;
      height: calc(100vh - 350px);
    }

    @media (max-width: 960px) {
      .InfoGrid { grid-template-columns: 1fr; }
      #chart { height: 60vh; min-height: 420px; }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="regime-core.js?v=2"></script>
</head>
<body>
  <div class="TopBar">
    <div class="Badge" id="modeBadge">Mode: UNITY</div>

    <div class="Group">
      <div class="Hint">Surface</div>
      <select id="modeSelect"></select>
    </div>

    <div class="Group">
      <div class="Hint" id="contextLabel">Context:</div>
      <select id="contextSelect"></select>
    </div>

    <div class="Group" id="legacyControls" hidden>
      <div class="Hint">Line:</div>
      <select id="lineSelect"></select>
      <div class="Hint">Count:</div>
      <input id="lineCount" type="number" min="1" max="50" value="1" />
    </div>

    <div class="Group" id="unityControls">
      <div class="Hint">Before:</div>
      <input id="ticksBefore" type="number" min="50" max="20000" value="900" />
      <div class="Hint">After:</div>
      <input id="ticksAfter" type="number" min="50" max="20000" value="450" />
    </div>

    <div class="Group">
      <button id="btnPrev" class="Btn">Prev</button>
      <button id="btnNext" class="Btn">Next</button>
      <button id="btnLoad" class="PrimaryBtn">Load</button>
    </div>

    <div class="Group">
      <button id="toggleMid" class="Btn">Mid</button>
      <button id="toggleKal" class="Btn on">Kal</button>
      <button id="toggleBid" class="Btn">Bid</button>
      <button id="toggleAsk" class="Btn">Ask</button>
      <button id="toggleUnityPivots" class="Btn on">Pivots</button>
      <button id="toggleUnitySwings" class="Btn on">Swings</button>
      <button id="toggleUnitySignals" class="Btn on">Signals</button>
      <button id="toggleUnityCandidates" class="Btn on">Candidates</button>
      <button id="toggleUnityEvents" class="Btn on">Events</button>
    </div>

    <div class="Group" id="legacyToggles" hidden>
      <button id="toggleSegLines" class="Btn">SegLines</button>
      <button id="toggleLegs" class="Btn">Legs</button>
      <button id="toggleZig" class="Btn">Zig</button>
    </div>

    <div style="flex:1"></div>
    <div class="Hint" id="meta"></div>
  </div>

  <main class="Shell">
    <section class="Panel ErrorPanel" id="errorPanel" hidden>
      <h3>Source Errors</h3>
      <ul class="ErrorList" id="errorList"></ul>
    </section>

    <section class="InfoGrid">
      <article class="Panel">
        <h2>UNITY Workflow</h2>
        <div id="workflowBody"></div>
      </article>
      <article class="Panel">
        <h2>Current Focus</h2>
        <div id="focusBody"></div>
      </article>
    </section>

    <section class="ChartWrap">
      <div id="chart"></div>
    </section>
  </main>
</body>
</html>
