name: Deploy datavis to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-datavis-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy datavis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EC2_PORT: ${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}

    steps:
      - name: Run remote deploy script
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ env.EC2_PORT }}
          script: /home/ec2-user/bin/deploy-datavis.sh
